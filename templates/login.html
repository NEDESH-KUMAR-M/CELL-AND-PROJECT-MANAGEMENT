<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPICAL LAYOUTS</title>
  <link rel="stylesheet" href="/static/login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>/* Base Reset */
/* Base Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #f0fdf4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Card */
.login-card {
  background-color: #ffffff;
  border-radius: 20px;
  padding: 3rem; /* Increased from 2.5rem */
  box-shadow: 0 10px 25px rgba(0, 128, 0, 0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 600px; /* Increased from 420px */
  width: 100%;
}


/* Logo */
.logo img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  margin-bottom: 1rem;
}

/* Title */
.title {
  font-size: 1.8rem;
  font-weight: 700;
  color: #065f46;
  margin-bottom: 2rem;
}

/* Form Styling */
.login-form {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.input-field {
  position: relative;
  display: flex;
  align-items: center;
}

.input-field .icon {
  position: absolute;
  left: 14px;
  font-size: 1rem;
  color: #888;
}

.input-field input {
  width: 100%;
  padding: 12px 12px 12px 42px;
  border: 1.5px solid #d1d5db;
  border-radius: 10px;
  font-size: 0.95rem;
  background-color: #f9fafb;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field input:focus {
  border-color: #22c55e;
  outline: none;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
}

/* Submit Button */
.submit-btn {
  background: linear-gradient(to right, #4ade80, #22c55e, #15803d);
  border: none;
  border-radius: 10px;
  padding: 12px;
  color: white;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s ease;
}

.submit-btn:hover {
  background: linear-gradient(to right, #22c55e, #166534);
}

/* Inline Flash Message (under submit button) */
.inline-flash {
  margin-top: 1rem;
}

.inline-flash-message {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  background-color: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fca5a5;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.9rem;
  line-height: 1.4;
  animation: fadeIn 0.2s ease-in;
}

.inline-flash-message .icon {
  margin-top: 2px;
  font-size: 1rem;
  flex-shrink: 0;
}

/* Close Button */
.close-inline {
  position: absolute;
  top: 6px;
  right: 10px;
  background: none;
  border: none;
  color: #b91c1c;
  font-size: 1rem;
  cursor: pointer;
  line-height: 1;
}

/* Optional animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Flash variants (for extensibility) */
.inline-flash-message.info {
  background-color: #e0f2fe;
  color: #0369a1;
  border-color: #90cdf4;
}

.inline-flash-message.success {
  background-color: #dcfce7;
  color: #15803d;
  border-color: #86efac;
}
.footer {
  margin-top: 2rem;
  text-align: center;
  font-size: 0.85rem;
  color: #6b7280;
  font-weight: bold; /* Tailwind's gray-500 */
}


/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 2rem 1.5rem;
  }

  .title {
    font-size: 1.5rem;
  }

  .submit-btn {
    font-size: 0.95rem;
  }
}

  </style>
</head>
<body>
 
  <div class="container">
    <div class="login-card">

      <!-- Logo and Title -->
      <div class="logo">
        <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo" />
      </div>
      <h1 class="title">Project Management</h1>

      <!-- Form -->
      <form method="POST" action="/" class="login-form">
        <div class="input-field">
          <i class="fa-solid fa-envelope icon"></i>
          <input type="email" name="email" placeholder="Email" required />
        </div>

        <div class="input-field">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" name="password" placeholder="Password" required />
        </div>

        <button type="submit" class="submit-btn">Sign In</button>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="inline-flash">
            {% for category, msg in messages %}
            <div class="inline-flash-message {{ category }}">
                <i class="fa-solid fa-triangle-exclamation icon"></i>
                <span>{{ msg }}</span>
                <button class="close-inline" onclick="this.parentElement.style.display='none';">&times;</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
      </form>
    </div>

    <!-- Footer -->
 <div class="footer">
    © Epical Layouts Pvt. Ltd. All Rights Reserved.
  </div>
</div>

  
  <script src="{{ url_for('static', filename='script/script.js') }}"></script>
</body>
</html>
